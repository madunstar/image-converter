<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konversi Gambar ke JPG</title>
    <!-- Menggunakan Bootstrap untuk UI yang rapi -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .upload-card { max-width: 500px; margin: 50px auto; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 10px; background-color: white; }
        #loading { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="upload-card text-center">
        <h2 class="mb-4">🖼️ Konversi ke JPG</h2>
        <p class="text-muted">Dukung format: HEIC, HEIF, WEBP, PNG, dll.</p>
        
        <form id="uploadForm">
            <div class="mb-3">
                <input class="form-control form-control-lg" type="file" id="fileInput" accept=".heic,.webp,.png,.jpeg,.jpg" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Konversi & Unduh</button>
        </form>

        <!-- Spinner Loading -->
        <div id="loading" class="mt-4">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Sedang memproses gambar...</p>
        </div>
        
        <div id="errorMessage" class="mt-3 text-danger fw-bold"></div>
    </div>
</div>

<script>
    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!file) return;

        // Tampilkan loading, sembunyikan pesan error
        document.getElementById('loading').style.display = 'block';
        document.getElementById('errorMessage').innerText = '';

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('/convert/', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                // Proses file hasil download
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                // Ambil nama file dari header Content-Disposition
                let filename = "hasil_konversi.jpg";
                const disposition = response.headers.get('Content-Disposition');
                if (disposition && disposition.indexOf('filename=') !== -1) {
                    const matches = /filename="([^"]*)"/.exec(disposition);
                    if (matches != null && matches[1]) filename = matches[1];
                }

                // Buat link rahasia untuk memicu download otomatis
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                
                // Bersihkan memori browser
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } else {
                const errData = await response.json();
                document.getElementById('errorMessage').innerText = errData.error || "Terjadi kesalahan pada server.";
            }
        } catch (error) {
            document.getElementById('errorMessage').innerText = "Gagal terhubung ke server.";
        } finally {
            // Sembunyikan loading
            document.getElementById('loading').style.display = 'none';
            // Reset input file
            fileInput.value = '';
        }
    });
</script>

</body>
</html>
